name: Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show environment info
      run: |
        echo "=== 系统信息 ==="
        uname -a
        echo ""
        echo "=== 磁盘空间 ==="
        df -h
        echo ""
        echo "=== 内存信息 ==="
        free -h

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Verify Java version
      run: java -version

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Clean previous build
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew assembleDebug --build-cache

    - name: Build Release APK
      run: ./gradlew assembleRelease --build-cache

    - name: Run Lint Check
      run: ./gradlew lint || true

    - name: Show build summary
      if: always()
      run: |
        echo "=== 构建产物 ==="
        find app/build/outputs -type f -name "*.apk" -exec ls -lh {} \;
        echo ""
        echo "=== APK 大小 ==="
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "Debug APK: $(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
        fi
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          echo "Release APK: $(du -h app/build/outputs/apk/release/app-release.apk | cut -f1)"
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug-apk-${{ github.sha }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release-apk-${{ github.sha }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Upload Lint Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-report
        path: app/build/reports/lint-results*.html
        retention-days: 7
